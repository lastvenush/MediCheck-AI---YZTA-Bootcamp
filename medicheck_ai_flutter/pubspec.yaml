name: medicheck_ai_flutter
description: "MediCheck AI mobile health literacy application."

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.10.0
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Uygulamanın JSON dosyasını okuyabilmesi için eklenen izin yolu
  assets:
    - assets/data/products.json